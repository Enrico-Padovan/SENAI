<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #identificado{
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <h1>Seletor de ID</h1>
    <p>Em um documento HTML, os seletores de ID do CSS selecionam um elementos
        baseado no conteúdo de seu atributo <strong>ID</strong>, o qual deve 
        ser exatamente igual ao valor dado ao seletor
    </p>
    <h2>Sintaxe</h2>
    <p>#valor_id{propriedades de estilo}</p>
    <h2>Exemplos</h2>
    <span id="identificado"> Aqui um span com pouco texto</span>
    <span>Aqui outro span.</span>
</body>
</html>
