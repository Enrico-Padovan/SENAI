<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PetGo</title>
    <link rel="shortcut icon" href="img/icons8-dog-paw-96.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
<div class="conteiner">
    <header>
        <img src="img/animais.avif" alt="Baner">
    </header>
    <br>
    <form>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">E-Mail</label>
          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Senha</label>
          <input type="password" class="form-control" id="exampleInputPassword1">
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1">
          <label class="form-check-label" for="exampleCheck1">Visualizar</label>
        </div>
        <button type="submit" class="btn btn-success">Entra</button><br>
        <button type="submit" class="btn btn-success">Cadastrar</button>
      </form>
</div>
</body>
</html>
